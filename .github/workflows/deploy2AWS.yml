name: deploy2aws

on:
  workflow_dispatch:
  push:
    branches: ["main"]
      
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

env:
  TF_CLOUD_ORGANIZATION: "${{ secrets.TF_CLOUD_ORGANIZATION }}"
  TF_API_TOKEN: "${{ secrets.TF_API_TOKEN }}"
  TF_WORKSPACE: "${{ secrets.TF_WORKSPACE }}"
  TF_DIRECTORY: "${{ vars.TF_CONFIG_DIRECTORY }}"
  TF_LOG: DEBUG
  TF_MAX_TIMEOUT: "30m" 

jobs:

  terraform-cloud-apply-run:
    environment: production
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: TFC - Upload config
        id: upload
        uses: hashicorp/tfc-workflows-github/actions/upload-configuration@v1.3.1
        with:
          workspace: ${{ env.TF_WORKSPACE }}
          directory: ${{ env.TF_DIRECTORY }}
      - name: TFC - Create Run
        uses: hashicorp/tfc-workflows-github/actions/create-run@v1.3.1
        id: create-run
        with:
          workspace: ${{ env.TF_WORKSPACE }}
          configuration_version: ${{ steps.upload.outputs.configuration_version_id }}
      - name: TFC - Apply
        uses: hashicorp/tfc-workflows-github/actions/apply-run@v1.3.1
        id: apply
        if: ${{ fromJSON(steps.create-run.outputs.payload).data.attributes.actions.IsConfirmable }}
        with:
          run: ${{ steps.create-run.outputs.run_id }}
          comment: "Apply Run from GitHub Actions CI ${{ github.sha }}"
      - name: TFC - Get/Show Run
        uses: hashicorp/tfc-workflows-github/actions/show-run@v1.3.1
        id: get-run
        with:
          run: ${{ steps.create-run.outputs.run_id }}
      - name: Show Run Status
        run: |
          echo "Latest Run Status: ${{ steps.get-run.outputs.run_status }}"
